# Reusable secret/credential expiry monitoring workflow.
#
# Checks for expiring:
#   - Key Vault secrets and certificates
#   - Azure AD app registration client secrets
#   - Service principal credentials
#
# Creates GitHub issues with remediation steps when credentials
# are approaching expiry.

name: Secret Expiry Monitor

on:
  workflow_call:
    inputs:
      warning_days:
        description: "Days before expiry to trigger a warning"
        required: false
        type: number
        default: 30
      critical_days:
        description: "Days before expiry to trigger a critical alert"
        required: false
        type: number
        default: 7
      key_vault_names:
        description: "JSON array of Key Vault names to check. Empty discovers all in the subscription."
        required: false
        type: string
        default: ""
      check_app_registrations:
        description: "Check Azure AD app registration client secrets"
        required: false
        type: boolean
        default: true
      check_service_principals:
        description: "Check service principal credentials"
        required: false
        type: boolean
        default: true
      create_issues:
        description: "Create GitHub issues for expiring credentials"
        required: false
        type: boolean
        default: true
      issue_assignees:
        description: "Comma-separated GitHub usernames to assign expiry issues"
        required: false
        type: string
        default: ""
      issue_labels:
        description: "Comma-separated labels for expiry issues"
        required: false
        type: string
        default: "secret-expiry,security,automated"
    secrets:
      ARM_CLIENT_ID:
        required: true
      ARM_CLIENT_SECRET:
        required: true
      ARM_SUBSCRIPTION_ID:
        required: true
      ARM_TENANT_ID:
        required: true

jobs:
  check-expiry:
    name: Check secret/credential expiry
    runs-on: ubuntu-latest
    env:
      ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure CLI login
        run: |
          az login --service-principal \
            -u "$ARM_CLIENT_ID" \
            -p "$ARM_CLIENT_SECRET" \
            --tenant "$ARM_TENANT_ID" \
            --output none
          az account set --subscription "$ARM_SUBSCRIPTION_ID"

      - name: Check Key Vault secrets and certificates
        id: keyvault
        run: |
          WARNING_DAYS=${{ inputs.warning_days }}
          CRITICAL_DAYS=${{ inputs.critical_days }}
          NOW_EPOCH=$(date +%s)
          WARNING_EPOCH=$((NOW_EPOCH + WARNING_DAYS * 86400))
          CRITICAL_EPOCH=$((NOW_EPOCH + CRITICAL_DAYS * 86400))

          # Discover Key Vaults
          if [ -n '${{ inputs.key_vault_names }}' ] && [ '${{ inputs.key_vault_names }}' != '' ]; then
            VAULTS=$(echo '${{ inputs.key_vault_names }}' | jq -r '.[]')
          else
            VAULTS=$(az keyvault list --query "[].name" -o tsv 2>/dev/null || echo "")
          fi

          if [ -z "$VAULTS" ]; then
            echo "No Key Vaults found."
            echo "kv_findings=[]" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          FINDINGS="[]"

          for VAULT in $VAULTS; do
            echo "Checking Key Vault: $VAULT"

            # Check secrets
            SECRETS=$(az keyvault secret list --vault-name "$VAULT" --query "[?attributes.enabled].{name:name,expires:attributes.expires}" -o json 2>/dev/null || echo "[]")

            echo "$SECRETS" | jq -c '.[]' 2>/dev/null | while read -r SECRET; do
              NAME=$(echo "$SECRET" | jq -r '.name')
              EXPIRES=$(echo "$SECRET" | jq -r '.expires // empty')

              if [ -n "$EXPIRES" ]; then
                EXPIRY_EPOCH=$(date -d "$EXPIRES" +%s 2>/dev/null || date -j -f "%Y-%m-%dT%H:%M:%S" "${EXPIRES%%+*}" +%s 2>/dev/null || echo "0")
                DAYS_LEFT=$(( (EXPIRY_EPOCH - NOW_EPOCH) / 86400 ))

                if [ "$EXPIRY_EPOCH" -le "$NOW_EPOCH" ]; then
                  SEVERITY="EXPIRED"
                elif [ "$EXPIRY_EPOCH" -le "$CRITICAL_EPOCH" ]; then
                  SEVERITY="CRITICAL"
                elif [ "$EXPIRY_EPOCH" -le "$WARNING_EPOCH" ]; then
                  SEVERITY="WARNING"
                else
                  continue
                fi

                FINDINGS=$(echo "$FINDINGS" | jq --arg vault "$VAULT" --arg name "$NAME" --arg type "secret" --arg expires "$EXPIRES" --arg severity "$SEVERITY" --argjson days "$DAYS_LEFT" \
                  '. + [{"vault": $vault, "name": $name, "type": $type, "expires": $expires, "severity": $severity, "days_left": $days}]')
              fi
            done

            # Check certificates
            CERTS=$(az keyvault certificate list --vault-name "$VAULT" --query "[?attributes.enabled].{name:name,expires:attributes.expires}" -o json 2>/dev/null || echo "[]")

            echo "$CERTS" | jq -c '.[]' 2>/dev/null | while read -r CERT; do
              NAME=$(echo "$CERT" | jq -r '.name')
              EXPIRES=$(echo "$CERT" | jq -r '.expires // empty')

              if [ -n "$EXPIRES" ]; then
                EXPIRY_EPOCH=$(date -d "$EXPIRES" +%s 2>/dev/null || date -j -f "%Y-%m-%dT%H:%M:%S" "${EXPIRES%%+*}" +%s 2>/dev/null || echo "0")
                DAYS_LEFT=$(( (EXPIRY_EPOCH - NOW_EPOCH) / 86400 ))

                if [ "$EXPIRY_EPOCH" -le "$NOW_EPOCH" ]; then
                  SEVERITY="EXPIRED"
                elif [ "$EXPIRY_EPOCH" -le "$CRITICAL_EPOCH" ]; then
                  SEVERITY="CRITICAL"
                elif [ "$EXPIRY_EPOCH" -le "$WARNING_EPOCH" ]; then
                  SEVERITY="WARNING"
                else
                  continue
                fi

                FINDINGS=$(echo "$FINDINGS" | jq --arg vault "$VAULT" --arg name "$NAME" --arg type "certificate" --arg expires "$EXPIRES" --arg severity "$SEVERITY" --argjson days "$DAYS_LEFT" \
                  '. + [{"vault": $vault, "name": $name, "type": $type, "expires": $expires, "severity": $severity, "days_left": $days}]')
              fi
            done

            # Check keys
            KEYS=$(az keyvault key list --vault-name "$VAULT" --query "[?attributes.enabled].{name:name,expires:attributes.expires}" -o json 2>/dev/null || echo "[]")

            echo "$KEYS" | jq -c '.[]' 2>/dev/null | while read -r KEY; do
              NAME=$(echo "$KEY" | jq -r '.name')
              EXPIRES=$(echo "$KEY" | jq -r '.expires // empty')

              if [ -n "$EXPIRES" ]; then
                EXPIRY_EPOCH=$(date -d "$EXPIRES" +%s 2>/dev/null || date -j -f "%Y-%m-%dT%H:%M:%S" "${EXPIRES%%+*}" +%s 2>/dev/null || echo "0")
                DAYS_LEFT=$(( (EXPIRY_EPOCH - NOW_EPOCH) / 86400 ))

                if [ "$EXPIRY_EPOCH" -le "$NOW_EPOCH" ]; then
                  SEVERITY="EXPIRED"
                elif [ "$EXPIRY_EPOCH" -le "$CRITICAL_EPOCH" ]; then
                  SEVERITY="CRITICAL"
                elif [ "$EXPIRY_EPOCH" -le "$WARNING_EPOCH" ]; then
                  SEVERITY="WARNING"
                else
                  continue
                fi

                FINDINGS=$(echo "$FINDINGS" | jq --arg vault "$VAULT" --arg name "$NAME" --arg type "key" --arg expires "$EXPIRES" --arg severity "$SEVERITY" --argjson days "$DAYS_LEFT" \
                  '. + [{"vault": $vault, "name": $name, "type": $type, "expires": $expires, "severity": $severity, "days_left": $days}]')
              fi
            done
          done

          # Save findings
          echo "$FINDINGS" > /tmp/kv-findings.json
          KV_COUNT=$(echo "$FINDINGS" | jq 'length')
          echo "kv_count=$KV_COUNT" >> "$GITHUB_OUTPUT"

      - name: Check App Registration client secrets
        id: appreg
        if: inputs.check_app_registrations
        run: |
          WARNING_DAYS=${{ inputs.warning_days }}
          CRITICAL_DAYS=${{ inputs.critical_days }}
          NOW_EPOCH=$(date +%s)
          WARNING_EPOCH=$((NOW_EPOCH + WARNING_DAYS * 86400))
          CRITICAL_EPOCH=$((NOW_EPOCH + CRITICAL_DAYS * 86400))

          # List all app registrations and their credentials
          APPS=$(az ad app list --all --query "[].{appId:appId,displayName:displayName,passwordCredentials:passwordCredentials,keyCredentials:keyCredentials}" -o json 2>/dev/null || echo "[]")

          FINDINGS="[]"

          echo "$APPS" | jq -c '.[]' 2>/dev/null | while read -r APP; do
            APP_NAME=$(echo "$APP" | jq -r '.displayName')
            APP_ID=$(echo "$APP" | jq -r '.appId')

            # Check password credentials (client secrets)
            echo "$APP" | jq -c '.passwordCredentials[]?' 2>/dev/null | while read -r CRED; do
              HINT=$(echo "$CRED" | jq -r '.hint // "***"')
              KEY_ID=$(echo "$CRED" | jq -r '.keyId')
              END_DATE=$(echo "$CRED" | jq -r '.endDateTime // empty')

              if [ -n "$END_DATE" ]; then
                EXPIRY_EPOCH=$(date -d "$END_DATE" +%s 2>/dev/null || date -j -f "%Y-%m-%dT%H:%M:%S" "${END_DATE%%+*}" +%s 2>/dev/null || echo "0")
                DAYS_LEFT=$(( (EXPIRY_EPOCH - NOW_EPOCH) / 86400 ))

                if [ "$EXPIRY_EPOCH" -le "$NOW_EPOCH" ]; then
                  SEVERITY="EXPIRED"
                elif [ "$EXPIRY_EPOCH" -le "$CRITICAL_EPOCH" ]; then
                  SEVERITY="CRITICAL"
                elif [ "$EXPIRY_EPOCH" -le "$WARNING_EPOCH" ]; then
                  SEVERITY="WARNING"
                else
                  continue
                fi

                FINDINGS=$(echo "$FINDINGS" | jq \
                  --arg app "$APP_NAME" --arg appId "$APP_ID" --arg type "client_secret" \
                  --arg hint "$HINT" --arg keyId "$KEY_ID" --arg expires "$END_DATE" \
                  --arg severity "$SEVERITY" --argjson days "$DAYS_LEFT" \
                  '. + [{"app": $app, "app_id": $appId, "type": $type, "hint": $hint, "key_id": $keyId, "expires": $expires, "severity": $severity, "days_left": $days}]')
              fi
            done

            # Check key credentials (certificates on app registrations)
            echo "$APP" | jq -c '.keyCredentials[]?' 2>/dev/null | while read -r CRED; do
              KEY_ID=$(echo "$CRED" | jq -r '.keyId')
              DISPLAY=$(echo "$CRED" | jq -r '.displayName // "unnamed"')
              END_DATE=$(echo "$CRED" | jq -r '.endDateTime // empty')

              if [ -n "$END_DATE" ]; then
                EXPIRY_EPOCH=$(date -d "$END_DATE" +%s 2>/dev/null || date -j -f "%Y-%m-%dT%H:%M:%S" "${END_DATE%%+*}" +%s 2>/dev/null || echo "0")
                DAYS_LEFT=$(( (EXPIRY_EPOCH - NOW_EPOCH) / 86400 ))

                if [ "$EXPIRY_EPOCH" -le "$NOW_EPOCH" ]; then
                  SEVERITY="EXPIRED"
                elif [ "$EXPIRY_EPOCH" -le "$CRITICAL_EPOCH" ]; then
                  SEVERITY="CRITICAL"
                elif [ "$EXPIRY_EPOCH" -le "$WARNING_EPOCH" ]; then
                  SEVERITY="WARNING"
                else
                  continue
                fi

                FINDINGS=$(echo "$FINDINGS" | jq \
                  --arg app "$APP_NAME" --arg appId "$APP_ID" --arg type "app_certificate" \
                  --arg hint "$DISPLAY" --arg keyId "$KEY_ID" --arg expires "$END_DATE" \
                  --arg severity "$SEVERITY" --argjson days "$DAYS_LEFT" \
                  '. + [{"app": $app, "app_id": $appId, "type": $type, "hint": $hint, "key_id": $keyId, "expires": $expires, "severity": $severity, "days_left": $days}]')
              fi
            done
          done

          echo "$FINDINGS" > /tmp/app-findings.json
          APP_COUNT=$(echo "$FINDINGS" | jq 'length')
          echo "app_count=$APP_COUNT" >> "$GITHUB_OUTPUT"

      - name: Check Service Principal credentials
        id: sp
        if: inputs.check_service_principals
        run: |
          WARNING_DAYS=${{ inputs.warning_days }}
          CRITICAL_DAYS=${{ inputs.critical_days }}
          NOW_EPOCH=$(date +%s)
          WARNING_EPOCH=$((NOW_EPOCH + WARNING_DAYS * 86400))
          CRITICAL_EPOCH=$((NOW_EPOCH + CRITICAL_DAYS * 86400))

          # List service principals with credentials
          SPS=$(az ad sp list --all --query "[?servicePrincipalType=='Application'].{appId:appId,displayName:displayName,passwordCredentials:passwordCredentials,keyCredentials:keyCredentials}" -o json 2>/dev/null || echo "[]")

          FINDINGS="[]"

          echo "$SPS" | jq -c '.[]' 2>/dev/null | while read -r SP; do
            SP_NAME=$(echo "$SP" | jq -r '.displayName')
            APP_ID=$(echo "$SP" | jq -r '.appId')

            echo "$SP" | jq -c '.passwordCredentials[]?' 2>/dev/null | while read -r CRED; do
              HINT=$(echo "$CRED" | jq -r '.hint // "***"')
              KEY_ID=$(echo "$CRED" | jq -r '.keyId')
              END_DATE=$(echo "$CRED" | jq -r '.endDateTime // empty')

              if [ -n "$END_DATE" ]; then
                EXPIRY_EPOCH=$(date -d "$END_DATE" +%s 2>/dev/null || date -j -f "%Y-%m-%dT%H:%M:%S" "${END_DATE%%+*}" +%s 2>/dev/null || echo "0")
                DAYS_LEFT=$(( (EXPIRY_EPOCH - NOW_EPOCH) / 86400 ))

                if [ "$EXPIRY_EPOCH" -le "$NOW_EPOCH" ]; then
                  SEVERITY="EXPIRED"
                elif [ "$EXPIRY_EPOCH" -le "$CRITICAL_EPOCH" ]; then
                  SEVERITY="CRITICAL"
                elif [ "$EXPIRY_EPOCH" -le "$WARNING_EPOCH" ]; then
                  SEVERITY="WARNING"
                else
                  continue
                fi

                FINDINGS=$(echo "$FINDINGS" | jq \
                  --arg sp "$SP_NAME" --arg appId "$APP_ID" --arg type "sp_secret" \
                  --arg hint "$HINT" --arg keyId "$KEY_ID" --arg expires "$END_DATE" \
                  --arg severity "$SEVERITY" --argjson days "$DAYS_LEFT" \
                  '. + [{"sp": $sp, "app_id": $appId, "type": $type, "hint": $hint, "key_id": $keyId, "expires": $expires, "severity": $severity, "days_left": $days}]')
              fi
            done
          done

          echo "$FINDINGS" > /tmp/sp-findings.json
          SP_COUNT=$(echo "$FINDINGS" | jq 'length')
          echo "sp_count=$SP_COUNT" >> "$GITHUB_OUTPUT"

      - name: Generate report
        id: report
        run: |
          # Merge all findings
          KV=$(cat /tmp/kv-findings.json 2>/dev/null || echo "[]")
          APP=$(cat /tmp/app-findings.json 2>/dev/null || echo "[]")
          SP=$(cat /tmp/sp-findings.json 2>/dev/null || echo "[]")

          python3 << 'PYTHON'
          import json, os

          kv = json.loads(open("/tmp/kv-findings.json").read()) if os.path.exists("/tmp/kv-findings.json") else []
          app = json.loads(open("/tmp/app-findings.json").read()) if os.path.exists("/tmp/app-findings.json") else []
          sp = json.loads(open("/tmp/sp-findings.json").read()) if os.path.exists("/tmp/sp-findings.json") else []

          total = len(kv) + len(app) + len(sp)
          expired = sum(1 for f in kv + app + sp if f.get("severity") == "EXPIRED")
          critical = sum(1 for f in kv + app + sp if f.get("severity") == "CRITICAL")
          warning = sum(1 for f in kv + app + sp if f.get("severity") == "WARNING")

          summary = []
          summary.append("## Secret and Credential Expiry Report")
          summary.append("")
          summary.append(f"**Total findings:** {total} ({expired} expired, {critical} critical, {warning} warning)")
          summary.append("")

          if kv:
              summary.append("### Key Vault Secrets, Certificates, and Keys")
              summary.append("")
              summary.append("| Severity | Vault | Name | Type | Expires | Days Left |")
              summary.append("| --- | --- | --- | --- | --- | --- |")
              for f in sorted(kv, key=lambda x: x.get("days_left", 999)):
                  severity_icon = {"EXPIRED": "EXPIRED", "CRITICAL": "CRITICAL", "WARNING": "WARNING"}.get(f["severity"], f["severity"])
                  summary.append(f'| {severity_icon} | {f["vault"]} | {f["name"]} | {f["type"]} | {f["expires"][:10]} | {f["days_left"]} |')
              summary.append("")

          if app:
              summary.append("### App Registration Credentials")
              summary.append("")
              summary.append("| Severity | App Name | App ID | Type | Hint | Expires | Days Left |")
              summary.append("| --- | --- | --- | --- | --- | --- | --- |")
              for f in sorted(app, key=lambda x: x.get("days_left", 999)):
                  summary.append(f'| {f["severity"]} | {f["app"]} | {f["app_id"][:8]}... | {f["type"]} | {f["hint"]} | {f["expires"][:10]} | {f["days_left"]} |')
              summary.append("")

          if sp:
              summary.append("### Service Principal Credentials")
              summary.append("")
              summary.append("| Severity | SP Name | App ID | Type | Hint | Expires | Days Left |")
              summary.append("| --- | --- | --- | --- | --- | --- | --- |")
              for f in sorted(sp, key=lambda x: x.get("days_left", 999)):
                  summary.append(f'| {f["severity"]} | {f["sp"]} | {f["app_id"][:8]}... | {f["type"]} | {f["hint"]} | {f["expires"][:10]} | {f["days_left"]} |')
              summary.append("")

          if total == 0:
              summary.append("No expiring credentials found. All secrets, certificates, and service principal credentials are outside the warning window.")

          report = "\n".join(summary)

          # Write to step summary
          with open(os.environ["GITHUB_STEP_SUMMARY"], "a") as f:
              f.write(report + "\n")

          # Write report for issue creation
          with open("/tmp/expiry-report.md", "w") as f:
              f.write(report + "\n")

          # Write counts for outputs
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"total={total}\n")
              f.write(f"expired={expired}\n")
              f.write(f"critical={critical}\n")
              f.write(f"warning={warning}\n")
              f.write(f"has_findings={'true' if total > 0 else 'false'}\n")

          # Set annotations
          if expired > 0:
              print(f"::error::{expired} credential(s) have EXPIRED and need immediate rotation")
          if critical > 0:
              print(f"::warning::{critical} credential(s) expire within {os.environ.get('CRITICAL_DAYS', '7')} days")
          if warning > 0:
              print(f"::notice::{warning} credential(s) expire within {os.environ.get('WARNING_DAYS', '30')} days")
          PYTHON
        env:
          WARNING_DAYS: ${{ inputs.warning_days }}
          CRITICAL_DAYS: ${{ inputs.critical_days }}

      - name: Create GitHub issue
        if: steps.report.outputs.has_findings == 'true' && inputs.create_issues
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const repo = context.repo;
            const total = parseInt('${{ steps.report.outputs.total }}');
            const expired = parseInt('${{ steps.report.outputs.expired }}');
            const critical = parseInt('${{ steps.report.outputs.critical }}');
            const warning = parseInt('${{ steps.report.outputs.warning }}');
            const assignees = '${{ inputs.issue_assignees }}'.split(',').map(s => s.trim()).filter(s => s);
            const labels = '${{ inputs.issue_labels }}'.split(',').map(s => s.trim()).filter(s => s);

            const severity = expired > 0 ? 'EXPIRED' : critical > 0 ? 'CRITICAL' : 'WARNING';
            const title = `Secret expiry alert: ${total} credential(s) need attention [${severity}]`;

            const report = fs.readFileSync('/tmp/expiry-report.md', 'utf8');

            const body = [
              report,
              '',
              '### Remediation',
              '',
              '**Key Vault secrets/certificates:**',
              '1. Generate a new secret or certificate in the Key Vault',
              '2. Update all applications that reference the old credential',
              '3. Disable the old version after confirming the new one works',
              '',
              '**App registration client secrets:**',
              '1. Navigate to Azure AD > App registrations > {app} > Certificates & secrets',
              '2. Create a new client secret',
              '3. Update all services using the old secret (Terraform pipelines, apps, etc.)',
              '4. Delete the old secret',
              '',
              '**Service principal credentials:**',
              '1. Same as app registration — service principals share credentials with their app registration',
              '2. Update `ARM_CLIENT_SECRET` in GitHub Actions secrets if this is the Terraform SP',
              '',
              '### Important',
              '',
              '- EXPIRED credentials may already be causing authentication failures',
              '- CRITICAL credentials need rotation within the next few days',
              '- Coordinate secret rotation with all dependent teams/services before rotating',
              '',
              `**Workflow run:** ${context.serverUrl}/${repo.owner}/${repo.repo}/actions/runs/${context.runId}`,
            ].join('\n');

            // Check for existing open issue
            const existing = await github.rest.issues.listForRepo({
              ...repo,
              state: 'open',
              labels: labels.join(','),
            });

            const existingIssue = existing.data.find(i => i.title.startsWith('Secret expiry alert:'));

            if (existingIssue) {
              // Update the existing issue body and add a comment
              await github.rest.issues.update({
                ...repo,
                issue_number: existingIssue.number,
                title,
                body,
              });
              await github.rest.issues.createComment({
                ...repo,
                issue_number: existingIssue.number,
                body: `Updated ${new Date().toISOString()}: ${total} finding(s) — ${expired} expired, ${critical} critical, ${warning} warning.\n\n**Run:** ${context.serverUrl}/${repo.owner}/${repo.repo}/actions/runs/${context.runId}`,
              });
              core.info(`Updated existing issue #${existingIssue.number}`);
            } else {
              const issue = await github.rest.issues.create({
                ...repo,
                title,
                body,
                assignees,
                labels,
              });
              core.info(`Created issue #${issue.data.number}`);
            }
