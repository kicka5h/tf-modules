# TEMPLATE: Copy this file to your caller repo at .github/workflows/secret-expiry.yml
#
# Monitors Key Vault secrets/certificates, app registration client secrets,
# and service principal credentials for approaching expiry.
#
# Creates a GitHub issue when credentials need rotation.
#
# Prerequisites:
#   - ARM_* secrets at repo level
#   - Service principal needs:
#     - Key Vault Reader on Key Vaults (or Key Vault Secrets User)
#     - Application.Read.All in Microsoft Graph (for app registrations)
#     - Directory.Read.All in Microsoft Graph (for service principals)
#   - Labels "secret-expiry", "security", "automated" created in the repo

name: Secret Expiry Monitor

on:
  schedule:
    # Run daily at 8 AM UTC
    - cron: "0 8 * * *"
  workflow_dispatch:

jobs:
  expiry:
    uses: <org>/<repo>/.github/workflows/secret-expiry.yml@main
    with:
      warning_days: 30                 # warn 30 days before expiry
      critical_days: 7                 # critical alert 7 days before expiry
      key_vault_names: ""              # empty = discover all vaults in subscription
      check_app_registrations: true
      check_service_principals: true
      create_issues: true
      issue_assignees: ""              # e.g., "security-lead,platform-team"
      issue_labels: "secret-expiry,security,automated"
    secrets:
      ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
