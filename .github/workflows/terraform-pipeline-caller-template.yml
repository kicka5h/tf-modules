# TEMPLATE: Copy this file to your caller repo at .github/workflows/terraform.yml
#
# Expected caller repo structure:
#   shared/                <- Terraform code (modules, resources, providers)
#     main.tf
#     variables.tf
#     providers.tf
#   environments/
#     dev/
#       backend.tf         <- remote state config for dev
#       dev.tfvars         <- environment-specific variable values
#     qa/
#       backend.tf
#       qa.tfvars
#     stage/
#       backend.tf
#       stage.tfvars
#     prod/
#       backend.tf
#       prod.tfvars
#
# How it works:
#   - shared/ contains the actual Terraform code (written once)
#   - environments/<env>/ contains only backend.tf and .tfvars files
#   - The pipeline copies backend.tf into shared/ and passes the .tfvars via -var-file
#   - Changes to shared/ trigger ALL environments
#   - Changes to environments/<env>/ trigger only that environment
#
# OPA policies are hosted centrally in the policies repo. No policies/
# directory needed in this repo.
#
# Behavior:
#   - PR:            validate + plan + OPA check + cost estimate (no apply)
#   - Merge to main: validate + plan + OPA check + cost estimate + apply
#   - dev/qa:        auto-deploy, deletion policies skipped
#   - stage:         requires approval, all policies enforced
#   - prod:          requires approval, all policies enforced
#   - Cost estimate: posts Infracost diff to PR, warns if change exceeds threshold
#
# Prerequisites:
#   - GitHub environments "stage" and "prod" with required reviewers
#   - ARM_* secrets at repo or environment level
#   - INFRACOST_API_KEY secret (get from https://www.infracost.io/)
#   - Policies repo accessible to this workflow

name: Terraform

on:
  pull_request:
    branches: [main]
    paths:
      - "shared/**"
      - "environments/**"
  push:
    branches: [main]
    paths:
      - "shared/**"
      - "environments/**"

jobs:
  terraform:
    uses: <org>/<repo>/.github/workflows/terraform-pipeline.yml@main
    with:
      shared_directory: "shared"
      environments_directory: "environments"
      terraform_version: "1.9.0"
      policies_repo: "<org>/<repo>"
      policies_ref: "main"
      cost_threshold_monthly: 500  # warn if monthly cost change exceeds $500
    secrets:
      ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
      INFRACOST_API_KEY: ${{ secrets.INFRACOST_API_KEY }}
