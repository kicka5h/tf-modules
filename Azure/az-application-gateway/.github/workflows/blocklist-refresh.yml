name: Blocklist Refresh

on:
  workflow_call:
    inputs:
      terraform_directory:
        description: "Directory containing the Terraform configuration"
        required: true
        type: string
      terraform_version:
        description: "Terraform version to use"
        required: false
        type: string
        default: "latest"
      auto_apply:
        description: "Automatically apply changes if blocklists have updated"
        required: false
        type: boolean
        default: false
    secrets:
      ARM_CLIENT_ID:
        required: true
      ARM_CLIENT_SECRET:
        required: true
      ARM_SUBSCRIPTION_ID:
        required: true
      ARM_TENANT_ID:
        required: true

jobs:
  check-blocklists:
    name: Check blocklist changes
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.check.outputs.has_changes }}
      changed_lists: ${{ steps.check.outputs.changed_lists }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore blocklist hash cache
        uses: actions/cache/restore@v4
        with:
          path: .blocklist-cache
          key: blocklist-hashes-
          restore-keys: |
            blocklist-hashes-

      - name: Check Spamhaus DROP
        id: spamhaus_drop
        run: |
          curl -sf https://www.spamhaus.org/drop/drop.txt -o /tmp/drop.txt
          NEW_HASH=$(sha256sum /tmp/drop.txt | awk '{print $1}')
          CACHE_FILE=".blocklist-cache/spamhaus-drop.sha256"
          mkdir -p .blocklist-cache
          if [ -f "$CACHE_FILE" ] && [ "$(cat $CACHE_FILE)" = "$NEW_HASH" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "$NEW_HASH" > "$CACHE_FILE"
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Check Spamhaus EDROP
        id: spamhaus_edrop
        run: |
          curl -sf https://www.spamhaus.org/drop/edrop.txt -o /tmp/edrop.txt
          NEW_HASH=$(sha256sum /tmp/edrop.txt | awk '{print $1}')
          CACHE_FILE=".blocklist-cache/spamhaus-edrop.sha256"
          mkdir -p .blocklist-cache
          if [ -f "$CACHE_FILE" ] && [ "$(cat $CACHE_FILE)" = "$NEW_HASH" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "$NEW_HASH" > "$CACHE_FILE"
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Check custom org IP blocklist
        id: custom_ip
        run: |
          curl -sf https://raw.githubusercontent.com/${{ github.repository_owner }}/blocked-hosts/main/ip-blocklist.txt -o /tmp/custom-ip.txt || true
          if [ -f /tmp/custom-ip.txt ]; then
            NEW_HASH=$(sha256sum /tmp/custom-ip.txt | awk '{print $1}')
            CACHE_FILE=".blocklist-cache/custom-ip.sha256"
            mkdir -p .blocklist-cache
            if [ -f "$CACHE_FILE" ] && [ "$(cat $CACHE_FILE)" = "$NEW_HASH" ]; then
              echo "changed=false" >> "$GITHUB_OUTPUT"
            else
              echo "$NEW_HASH" > "$CACHE_FILE"
              echo "changed=true" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Determine changes
        id: check
        run: |
          CHANGED_LISTS=""
          HAS_CHANGES=false
          if [ "${{ steps.spamhaus_drop.outputs.changed }}" = "true" ]; then
            CHANGED_LISTS="${CHANGED_LISTS}spamhaus-drop,"
            HAS_CHANGES=true
          fi
          if [ "${{ steps.spamhaus_edrop.outputs.changed }}" = "true" ]; then
            CHANGED_LISTS="${CHANGED_LISTS}spamhaus-edrop,"
            HAS_CHANGES=true
          fi
          if [ "${{ steps.custom_ip.outputs.changed }}" = "true" ]; then
            CHANGED_LISTS="${CHANGED_LISTS}custom-ip,"
            HAS_CHANGES=true
          fi
          echo "has_changes=$HAS_CHANGES" >> "$GITHUB_OUTPUT"
          echo "changed_lists=$CHANGED_LISTS" >> "$GITHUB_OUTPUT"
          echo "Blocklist changes detected: $HAS_CHANGES ($CHANGED_LISTS)"

      - name: Cache blocklist hashes
        if: steps.check.outputs.has_changes == 'true'
        uses: actions/cache/save@v4
        with:
          path: .blocklist-cache
          key: blocklist-hashes-${{ github.sha }}-${{ github.run_id }}

  deploy:
    name: Deploy blocklist updates
    needs: check-blocklists
    if: needs.check-blocklists.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    environment: production
    env:
      ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ inputs.terraform_version }}

      - name: Terraform Init
        working-directory: ${{ inputs.terraform_directory }}
        run: terraform init

      - name: Terraform Plan
        working-directory: ${{ inputs.terraform_directory }}
        run: |
          terraform plan -out=tfplan -detailed-exitcode 2>&1 | tee plan-output.txt
          EXIT_CODE=${PIPESTATUS[0]}
          if [ $EXIT_CODE -eq 0 ]; then
            echo "No changes detected in Terraform plan."
            echo "has_plan_changes=false" >> "$GITHUB_ENV"
          elif [ $EXIT_CODE -eq 2 ]; then
            echo "Changes detected in Terraform plan."
            echo "has_plan_changes=true" >> "$GITHUB_ENV"
          else
            echo "Terraform plan failed."
            exit 1
          fi

      - name: Terraform Apply
        if: env.has_plan_changes == 'true' && inputs.auto_apply
        working-directory: ${{ inputs.terraform_directory }}
        run: terraform apply tfplan

      - name: Summary
        run: |
          echo "## Blocklist Refresh Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Changed lists:** ${{ needs.check-blocklists.outputs.changed_lists }}" >> "$GITHUB_STEP_SUMMARY"
          echo "**Plan has changes:** ${{ env.has_plan_changes }}" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ inputs.auto_apply }}" = "true" ] && [ "${{ env.has_plan_changes }}" = "true" ]; then
            echo "**Applied:** Yes" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "**Applied:** No (manual approval required)" >> "$GITHUB_STEP_SUMMARY"
          fi
